AWSTemplateFormatVersion: '2010-09-09'
Description: 'Mission Three - Stage 2: Basic Security Groups (Free-Tier Compatible)'

Parameters:
  VPCAId:
    Type: String
    Description: VPC A ID
    Default: vpc-0f1c21be4ff488013
  
  VPCBId:
    Type: String
    Description: VPC B ID
    Default: vpc-0fd4e594a49ffccb1
  
  BastionSubnetCIDR:
    Type: String
    Description: Bastion subnet CIDR
    Default: 10.0.1.0/24
  
  VPCBCidr:
    Type: String
    Description: VPC B CIDR block
    Default: 10.1.0.0/16

Resources:
  # Bastion Security Group
  BastionSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: Bastion-SG
      GroupDescription: Security group for Bastion host
      VpcId: !Ref VPCAId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH from anywhere
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound
      Tags:
        - Key: Name
          Value: Bastion-SG

  # Monolithic App Security Group
  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: AppSG
      GroupDescription: Security group for Monolithic App
      VpcId: !Ref VPCAId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref BastionSubnetCIDR
          Description: SSH from Bastion subnet
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref VPCBCidr
          Description: SSH from VPC B
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref BastionSubnetCIDR
          Description: HTTP from Bastion subnet
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref VPCBCidr
          Description: HTTP from VPC B
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref BastionSubnetCIDR
          Description: HTTPS from Bastion subnet
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref VPCBCidr
          Description: HTTPS from VPC B
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound
      Tags:
        - Key: Name
          Value: AppSG

  # VPC B App Security Group
  AppBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: AppB-SG
      GroupDescription: Security group for VPC B App
      VpcId: !Ref VPCBId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 10.0.0.0/16
          Description: SSH from VPC A
        - IpProtocol: -1
          CidrIp: 10.0.0.0/16
          Description: All traffic from VPC A
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound
      Tags:
        - Key: Name
          Value: AppB-SG

Outputs:
  BastionSecurityGroupId:
    Description: Bastion Security Group ID
    Value: !Ref BastionSecurityGroup
    Export:
      Name: !Sub '${AWS::StackName}-BastionSG'
  
  AppSecurityGroupId:
    Description: Monolithic App Security Group ID
    Value: !Ref AppSecurityGroup
    Export:
      Name: !Sub '${AWS::StackName}-AppSG'
  
  AppBSecurityGroupId:
    Description: VPC B App Security Group ID
    Value: !Ref AppBSecurityGroup
    Export:
      Name: !Sub '${AWS::StackName}-AppBSG'

